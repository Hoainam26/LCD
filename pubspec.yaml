name: union_management_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  http: ^1.6.0
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  intl: ^0.18.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.3.9

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android:
    color: "#FFFFFF"
  ios:
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/